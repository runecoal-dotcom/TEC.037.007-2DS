<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-
width, initial-scale=1.0">

    <title>Acessando elementos no DOM</title>

    <style>
        html {
            font-family: sans-serif;
            color: #333; 
        }

        body {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 15px;
        }

        div,
        article {
            padding: 10px;
            margin: 5px;
            border: 1px solid #dedede;
        }
    </style>

</head>

<body>

    <h1>Acessando elementos no DOM</h1>

    <h2>ID (#demo)</h2>
    <div id="demo">Acesso pelo ID</div>

    <h2>Class (.categoria)</h2>
    <div class="categoria">Acesso pela class (1)</div>
    <div class="categoria">Acesso pela class (2)</div>

    <h2>Tag (article)</h2>
    <article>Acesso pela tag (1)</article>
    <article>Acesso pela tag (2)</article>

    <h2>Query Selector</h2>
    <div id="demo-query">Acesso pela query</div>

    <h2>Query Selector All</h2>
    <div class="demo-query-all">Acesso pela query
        all (1)</div>
    <div class="demo-query-all">Acesso pela query
        all (2)</div>
	<script src="javascript.js"></script>
</body>

</html>
