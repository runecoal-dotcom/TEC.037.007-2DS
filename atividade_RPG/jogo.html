<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- Cabeçalho e Título do Jogo -->
            <div class="card-header text-center">
                Custerpy - Criado por Rune
            </div>
            <!-- Tela Central do Jogo -->
            <div class="card-body" style="background-image: url(assets/Fundo.png); background-size: cover; background-position: center;">
                <div class="row"> <!-- Status do Herói -->
                    <div class="col">
                        <ul class="list-group float-end text-center" style="width: 225px;">
                            <li class="list-group-item"><strong id= "nome-hero">Rune</strong></li>
                            <li id="titulo-hero" class="list-group-item">Mestra dos Dinossauros</li>
                            <li class="list-group-item">
                                ❤️
                                <progress id="hp-hero" value="100" max="100" style="accent-color: rgb(255, 0, 0)" ;></progress>
                            </li>
                            <li class="list-group-item">
                                🧪
                                <progress id="mana-hero" value="100" max="100" style="accent-color: rgb(0, 174, 255)" ;></progress>
                            </li>
                            <li class="list-group-item">
                                ⚡
                                <progress id="energia-hero" value="0" max="100" style="accent-color: rgb(255, 255, 0)" ;></progress>
                            </li>
                        </ul>
                    </div>
                    <div class="col">
                        <ul class="list-group float-start text-center" style="width: 225px;">
                            <li class="list-group-item"><strong id="nome-hero2">Aurora</strong></li>
                            <li id="titulo-hero2" class="list-group-item">Hera Venenosa</li>
                            <li class="list-group-item">❤️
                                <progress id="hp-hero2" value="100" max="100" style="accent-color: rgb(255, 0, 0)" ;></progress>
                            </li>
                            <li class="list-group-item">🧪
                                <progress id="mana-hero2" value="100" max="100" style="accent-color: rgb(0, 174, 255)" ;></progress>
                            </li>
                            <li class="list-group-item">⚡
                                <progress id="energia-hero2" value="0" max="100" style="accent-color: rgb(255, 255, 0)" ;></progress>
                            </li>
                        </ul>
                    </div>
                </div> <!-- Fim do Status do Herói -->
                <div class="row">
                    <!-- IMG HERO -->
                    <div class="col text-end">
                        <img src="assets/Hero.gif" width="450px" height="300px" />
                        <div id="controles"> </div>
                    </div>
                    <!-- IMG BOSS -->
                    <div class="col">
                        <img src="assets/Hero2.gif" width="300px" height="300px" />
                    </div>
                </div>
            </div>




            <div class="card-footer text-center">
                <small class="text-muted">Ações do herói</small>
                <p></p>
                <small class="text-muted">Ações do vilão</small>
            </div>
        </div> <!-- fechamento de card -->
    </div> <!-- fechamento do container -->
</body>

</html>
